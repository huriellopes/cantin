user  nginx;
worker_processes  50;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    keepalive_timeout  3600;

    # Compressão gzip de recursos textuais (HTML, CSS, JS, SVG, fontes não
    # comprimidas). gzip_proxied any é necessário porque o tráfego chega via
    # Nginx Proxy Manager (requisição proxied); sem isso o nginx não comprime.
    # Não incluímos webp/png/woff2 (já comprimidos).
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml
        font/ttf
        font/otf
        application/vnd.ms-fontobject;

    include /etc/nginx/conf.d/*.conf;
}
