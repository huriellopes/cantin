# HTTP: serve o desafio ACME (Let's Encrypt) e redireciona o resto para HTTPS.
server {
  listen 80;
  listen [::]:80;
  server_name cantinbr.com.br;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# HTTPS: aplicação.
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name cantinbr.com.br;
  root /app/public;

  ssl_certificate     /etc/letsencrypt/live/cantinbr.com.br/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/cantinbr.com.br/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  add_header X-Frame-Options "SAMEORIGIN";
  add_header X-Content-Type-Options "nosniff";
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  index index.php;

  charset utf-8;

  # Permite uploads de mídia do editor (alinhado ao php.ini e ao config/editor.php).
  client_max_body_size 26M;

  location / {
    try_files $uri $uri/ /index.php?$query_string;
  }

  location = /favicon.ico { access_log off; log_not_found off; }
  # robots.txt é gerado dinamicamente pelo Laravel (rota env-aware), então NÃO
  # damos um location de match exato (que tentaria servir um arquivo estático
  # inexistente e retornaria 404); deixamos cair no `location /` → index.php.

  error_page 404 /index.php;

  location ~ \.php$ {
    fastcgi_pass app:9000;
    fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
    # Informa ao PHP/Laravel que a requisição chegou via HTTPS (cookie secure, URLs).
    fastcgi_param HTTPS on;
    fastcgi_param HTTP_X_FORWARDED_PROTO https;
    include fastcgi_params;
  }

  location ~ /\.(?!well-known).* {
    deny all;
  }
}
