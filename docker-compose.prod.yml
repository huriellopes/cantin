version: '3.8'

services:
  nginx:
    container_name: nginx
    image: nginx:1.25-alpine3.17
    ports:
      - "80:80"
    volumes:
      - ./:/app
      - ./.docker/nginx/conf.d:/etc/nginx/conf.d
      - ./.docker/nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app
    networks:
      - cantin

  app:
    build:
      context: ./.docker
      dockerfile: Dockerfile
    container_name: app
    working_dir: /app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    volumes:
      - ./:/app
    external_links:
      - nginx:app.test
    ports:
      - "9000:9000"
    command: >
      sh -c "php-fpm"
    networks:
      - cantin

networks:
  cantin:
    driver: bridge
