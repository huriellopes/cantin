services:
  nginx:
    container_name: nginx
    image: nginx:1.27-alpine
    ports:
      - "80:80"
#      - "443:443"
    volumes:
      - ./:/app
      - ./.docker/nginx/conf.d:/etc/nginx/conf.d
      - ./.docker/nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - cantin

  app:
    build:
      context: ./.docker
      dockerfile: Dockerfile
    container_name: app
    working_dir: /app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    volumes:
      - ./:/app
    external_links:
      - nginx:app.test
    networks:
      - cantin

  db:
    container_name: database
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-cantin}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?defina DB_PASSWORD no .env}
    restart: always
    volumes:
      - cantin-db:/var/lib/postgresql/data
    # Porta não exposta ao host em produção; acesso apenas pela rede interna.
    networks:
      - cantin

networks:
  cantin:
    driver: bridge

volumes:
  cantin-db:
