services:
  nginx:
    container_name: nginx
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/app
      - ./.docker/nginx/conf.d:/etc/nginx/conf.d
      - ./.docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./.docker/certbot/conf:/etc/letsencrypt
      - ./.docker/certbot/www:/var/www/certbot
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - cantin

  app:
    build:
      context: ./.docker
      dockerfile: Dockerfile
    container_name: app
    working_dir: /app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    volumes:
      - ./:/app
    external_links:
      - nginx:app.test
    networks:
      - cantin

  db:
    container_name: database
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-cantin}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?defina DB_PASSWORD no .env}
    restart: always
    volumes:
      # Bind-mount dos dados do Postgres — preserva a base de produção já
      # existente em ./.docker/database (não usar volume nomeado, sob risco
      # de subir o banco vazio e orfanizar os dados atuais).
      - ./.docker/database:/var/lib/postgresql/data
    # Porta não exposta ao host em produção; acesso apenas pela rede interna.
    networks:
      - cantin

  # Let's Encrypt: renova os certificados a cada 12h (emissão inicial via
  # ./.docker/init-letsencrypt.sh). O nginx recarrega o cert ao reiniciar/deploy.
  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./.docker/certbot/conf:/etc/letsencrypt
      - ./.docker/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped
    networks:
      - cantin

networks:
  cantin:
    driver: bridge
