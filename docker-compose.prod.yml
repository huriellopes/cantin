services:
  nginx:
    container_name: nginx
    image: nginx:1.27-alpine
    # Quem publica 80/443 no host é o Nginx Proxy Manager (projeto /apps/proxy).
    # Este nginx NÃO expõe portas no host (evita conflito com o NPM) e é
    # alcançado pelo NPM através da rede externa 'proxy', pelo nome 'nginx'.
    # Rollback: reexpor as portas abaixo e remover a rede 'proxy'.
    # ports:
    #   - "80:80"
    #   - "443:443"
    volumes:
      - ./:/app
      - ./.docker/nginx/conf.d:/etc/nginx/conf.d
      - ./.docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./.docker/certbot/conf:/etc/letsencrypt
      - ./.docker/certbot/www:/var/www/certbot
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - cantin
      - proxy

  app:
    build:
      context: ./.docker
      dockerfile: Dockerfile
    container_name: app
    working_dir: /app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    volumes:
      - ./:/app
    external_links:
      - nginx:app.test
    networks:
      - cantin

  db:
    container_name: database
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-cantin}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?defina DB_PASSWORD no .env}
    restart: always
    volumes:
      # Bind-mount dos dados do Postgres — preserva a base de produção já
      # existente em ./.docker/database (não usar volume nomeado, sob risco
      # de subir o banco vazio e orfanizar os dados atuais).
      - ./.docker/database:/var/lib/postgresql/data
    # Porta publicada APENAS no localhost do host (127.0.0.1): inacessível pela
    # internet; alcançável só por quem já está dentro do servidor — ex.: túnel
    # SSH do PhpStorm/DataGrip. Não usar 0.0.0.0/"5432:5432" (exporia o banco).
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - cantin

  # Let's Encrypt: renova os certificados a cada 12h (emissão inicial via
  # ./.docker/init-letsencrypt.sh). O nginx recarrega o cert ao reiniciar/deploy.
  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./.docker/certbot/conf:/etc/letsencrypt
      - ./.docker/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped
    networks:
      - cantin

networks:
  cantin:
    driver: bridge
  # Rede do Nginx Proxy Manager (criada pelo projeto /apps/proxy). O nginx do
  # cantin entra nela para que o NPM o alcance e roteie cantinbr.com.br.
  proxy:
    external: true
    name: proxy
