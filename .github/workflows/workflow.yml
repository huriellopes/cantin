name: Continuous Integration

on:
  push:
    branches: [ 'main', 'dev' ]
  pull_request:
    branches: [ 'main', 'dev' ]

jobs:
  tests:
    name: Testes (Pest) + Lint (Pint)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, sqlite, pdo_sqlite, intl, bcmath, gd
          coverage: none

      - name: Cache do Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}

      - name: Instalar dependências PHP
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Preparar ambiente
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Verificar formatação (Pint)
        run: ./vendor/bin/pint --test

      - name: Rodar testes (Pest)
        run: ./vendor/bin/pest --ci

  build:
    name: Build de assets (Vite)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Instalar dependências e build
        run: |
          npm ci
          npm run build
