name: Deploy

# Deploy automático para o servidor (Contabo) via SSH.
# Dispara quando um Release é publicado, ou manualmente.
#
# Secrets necessários (Settings -> Secrets and variables -> Actions):
#   SSH_HOST       -> IP/host do servidor (ex.: 217.76.60.113)
#   SSH_USER       -> usuário SSH
#   SSH_KEY        -> chave privada SSH (conteúdo do arquivo)
#   SSH_PORT       -> porta SSH (ex.: 22)
#   DEPLOY_PATH    -> caminho do projeto no servidor (ex.: /var/www/cantin)
#   DEPLOY_BRANCH  -> branch a publicar (opcional; padrão: main)
on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy (Contabo)
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"

            BRANCH="${{ secrets.DEPLOY_BRANCH || 'main' }}"
            COMPOSE="docker compose -f docker-compose.prod.yml"

            echo "==> Atualizando código ($BRANCH)"
            git fetch --all --prune --tags
            git reset --hard "origin/${BRANCH}"

            echo "==> Gravando versão atual (tag git) em VERSION"
            git describe --tags --always > VERSION 2>/dev/null || echo "dev" > VERSION

            echo "==> Garantindo certificado para o nginx subir (dummy só se não existir)"
            mkdir -p ./.docker/certbot/www
            # A verificação roda como root DENTRO do container: os arquivos do
            # cert real (live -> archive 0700) pertencem ao root, e checar como
            # usuário do host falharia, regenerando o dummy e SOBRESCREVENDO o
            # certificado válido. Aqui só geramos o dummy se realmente não houver.
            docker run --rm -v "$(pwd)/.docker/certbot/conf:/etc/letsencrypt" \
              --entrypoint sh certbot/certbot -c '
                D=/etc/letsencrypt/live/cantinbr.com.br
                if [ ! -s "$D/fullchain.pem" ]; then
                  echo "    -> gerando certificado temporário auto-assinado"
                  mkdir -p "$D"
                  openssl req -x509 -nodes -newkey rsa:2048 -days 1 \
                    -keyout "$D/privkey.pem" -out "$D/fullchain.pem" \
                    -subj "/CN=cantinbr.com.br"
                else
                  echo "    -> certificado existente preservado"
                fi'

            echo "==> Subindo containers (build da imagem app)"
            $COMPOSE build app
            $COMPOSE up -d

            echo "==> Dependências de produção"
            $COMPOSE exec -T app composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

            echo "==> Assets"
            $COMPOSE exec -T app npm ci
            $COMPOSE exec -T app npm run build

            echo "==> Migrações e otimização"
            $COMPOSE exec -T app php artisan migrate --force
            $COMPOSE exec -T app php artisan optimize

            echo "==> Gerando sitemap.xml"
            $COMPOSE exec -T app php artisan sitemap:generate

            echo "==> Aquecendo o cache de estatísticas do dashboard"
            $COMPOSE exec -T app php artisan dashboard:refresh

            echo "==> Permissões de escrita (workers rodam como www-data)"
            # public/sitemap.xml é regenerado diariamente pelo agendador (www-data):
            # ele precisa ser dono do arquivo para sobrescrevê-lo (file_put_contents).
            $COMPOSE exec -T -u root app chown -R www-data:www-data storage bootstrap/cache
            $COMPOSE exec -T -u root app chown www-data:www-data public/sitemap.xml

            echo "==> Reiniciando app para aplicar a config do supervisor/php-fpm"
            $COMPOSE restart app

            echo "==> Reiniciando nginx (carrega o certificado de forma confiável)"
            # restart (não 'reload'): ao trocar o cert (ex.: dummy -> real ou
            # após renovação), o reload nem sempre recarrega os symlinks; o
            # restart garante o cert atual.
            $COMPOSE restart nginx

            echo "==> Deploy concluído"
